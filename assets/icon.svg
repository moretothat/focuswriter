<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d15"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#6dd5ed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Pen/Writing symbol -->
  <g transform="translate(512, 512)">
    <!-- Pen body -->
    <path d="M-80,-280 L80,-280 L120,200 L40,320 L-40,320 L-120,200 Z"
          fill="url(#accent)"
          transform="rotate(-30)"/>

    <!-- Pen tip -->
    <path d="M-40,320 L0,400 L40,320 Z"
          fill="#e0e0e0"
          transform="rotate(-30)"/>

    <!-- Lock symbol overlay -->
    <rect x="-60" y="-40" width="120" height="90" rx="10" fill="#1a1a2e" opacity="0.9"/>
    <rect x="-40" y="-80" width="80" height="50" rx="25" fill="none" stroke="#4a9eff" stroke-width="12"/>
    <circle cx="0" cy="10" r="15" fill="#4a9eff"/>
    <rect x="-6" y="10" width="12" height="25" fill="#4a9eff"/>
  </g>

  <!-- Progress bar at bottom -->
  <rect x="150" y="850" width="724" height="24" rx="12" fill="#333"/>
  <rect x="150" y="850" width="500" height="24" rx="12" fill="url(#accent)"/>
</svg>
